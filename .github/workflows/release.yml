name: Scout Bee release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      allow_unsigned_preview:
        description: "Explicitly allow an unsigned Windows executable for this Preview run only"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Check out immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Configure Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Configure Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod

      - name: Install and verify
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm verify

      - name: Build portable Windows executable
        shell: pwsh
        run: |
          $version = (Get-Content -Raw VERSION).Trim()
          New-Item -ItemType Directory -Force dist | Out-Null
          $env:CGO_ENABLED = '0'
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          go build -trimpath -ldflags "-s -w -X main.scoutVersion=$version" `
            -o "dist/scout-bee-$version-windows-amd64.exe" .

      - name: Resolve fail-closed release signing policy
        id: release-policy
        shell: pwsh
        env:
          SCOUT_ALLOW_UNSIGNED_PREVIEW: ${{ inputs.allow_unsigned_preview && 'true' || 'false' }}
          # ADR 0026: Authenticode signing is performed by SignPath Foundation
          # through a submit/wait round trip, not by locally held PFX material.
          # Signing counts as "available" only when the SignPath wiring is fully
          # configured (API token secret plus organization-id repository
          # variable). When it is not, scripts/release-policy.mjs fails closed:
          # stable and RC releases hard-fail, and previews require the explicit
          # allow_unsigned_preview opt-in to ship labeled unsigned bytes.
          SCOUT_WINDOWS_SIGNING_AVAILABLE: ${{ secrets.SIGNPATH_API_TOKEN != '' && vars.SIGNPATH_ORGANIZATION_ID != '' }}
        run: node scripts/release-policy.mjs

      # ADR 0026 (C1): SignPath Foundation signing round trip. The three steps
      # below replace the previous PFX signtool-sign step and run only on the
      # 'signed' policy branch; GV3 unsigned previews never touch SignPath.
      #
      # PLACEHOLDER slugs: the SignPath organization and project do not exist
      # yet. Per ADR 0026 the GV3 labeled unsigned preview ships BEFORE the
      # SignPath application is submitted, so until the application is approved
      # leave SIGNPATH_API_TOKEN (secret) and SIGNPATH_ORGANIZATION_ID
      # (repository variable) unset: the policy step then resolves signing as
      # unavailable and stable releases fail closed instead of shipping
      # unsigned. Before the first signed run the SignPath GitHub App must be
      # installed on this repository and the slugs below replaced with the real
      # values from the approved SignPath project.
      - name: Upload unsigned Windows executable for signing
        if: steps.release-policy.outputs.signing_mode == 'signed'
        id: unsigned-artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          # Deliberately NOT named scout-bee-*: the publish job downloads with
          # `pattern: scout-bee-*` and merge-multiple, and this unsigned
          # signing input must never be able to clobber the signed bytes.
          name: signing-input-windows-amd64
          path: dist/scout-bee-*-windows-amd64.exe
          if-no-files-found: error

      - name: Submit SignPath signing request and wait for signed bytes
        if: steps.release-policy.outputs.signing_mode == 'signed'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: scout-bee # PLACEHOLDER - real slug assigned when the SignPath application is approved (ADR 0026)
          signing-policy-slug: release-signing # PLACEHOLDER - release policy with per-release manual approval (ADR 0026)
          github-artifact-id: ${{ steps.unsigned-artifact.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist/signpath-signed

      - name: Replace executable with signed bytes and verify Authenticode
        if: steps.release-policy.outputs.signing_mode == 'signed'
        shell: pwsh
        run: |
          $artifact = Get-ChildItem dist\scout-bee-*-windows-amd64.exe -File -ErrorAction Stop
          $signed = Join-Path 'dist/signpath-signed' $artifact.Name
          if (-not (Test-Path -LiteralPath $signed)) { throw "SignPath did not return $($artifact.Name)." }
          Copy-Item -LiteralPath $signed -Destination $artifact.FullName -Force
          Remove-Item dist/signpath-signed -Recurse -Force
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
            -Filter signtool.exe -Recurse |
            Where-Object FullName -Match '\\x64\\signtool\.exe$' |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signTool) { throw 'signtool.exe was not found on the release runner.' }
          & $signTool verify /pa /all $artifact.FullName
          if ($LASTEXITCODE -ne 0) { throw 'Authenticode verification failed.' }

      - name: Mark explicitly unsigned Preview executable
        if: steps.release-policy.outputs.signing_mode == 'unsigned-preview'
        shell: pwsh
        run: |
          $artifact = Get-ChildItem dist\scout-bee-*-windows-amd64.exe -File -ErrorAction Stop
          $unsignedName = $artifact.BaseName + '-UNSIGNED-PREVIEW.exe'
          Move-Item -LiteralPath $artifact.FullName -Destination (Join-Path $artifact.DirectoryName $unsignedName)

      - name: Record Windows signing evidence
        shell: pwsh
        env:
          SCOUT_WINDOWS_SIGNING_MODE: ${{ steps.release-policy.outputs.signing_mode }}
          SCOUT_EXPLICIT_UNSIGNED_PREVIEW_OPT_IN: ${{ steps.release-policy.outputs.explicit_unsigned_preview_opt_in }}
        run: node scripts/build-windows-signing-metadata.mjs

      - name: Upload Windows package and signing evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scout-bee-windows-amd64
          path: |
            dist/scout-bee-*-windows-amd64*.exe
            dist/scout-bee-windows-signing.json
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Configure Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Configure Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod

      - name: Install and verify
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm verify

      - name: Build Linux archive
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          mkdir -p dist/linux-package
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w -X main.scoutVersion=$version" \
            -o dist/linux-package/scout-bee .
          cp packaging/RELEASE-README.txt dist/linux-package/README.txt
          tar --create --gzip --file "dist/scout-bee-${version}-linux-amd64.tar.gz" \
            --directory dist/linux-package scout-bee README.txt
          pnpm release:supply-chain

      - name: Upload Linux package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scout-bee-linux-amd64
          path: dist/scout-bee-*-linux-amd64.tar.gz
          if-no-files-found: error

      - name: Upload Scout supply-chain metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scout-bee-supply-chain
          path: |
            dist/scout-bee-sbom.cdx.json
            dist/scout-bee-license-report.md
          if-no-files-found: error

  publish:
    if: github.ref_type == 'tag'
    needs: [windows, linux]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Configure Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Download exact packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: scout-bee-*
          path: dist
          merge-multiple: true

      - name: Verify version and build release manifest
        run: |
          node scripts/verify-version.mjs
          node scripts/build-release-manifest.mjs
          (cd dist && sha256sum scout-bee-* > SHA256SUMS)

      - name: Attest Scout packages and release metadata
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            dist/scout-bee-*-windows-amd64*.exe
            dist/scout-bee-*-linux-amd64.tar.gz
            dist/scout-bee-windows-signing.json
            dist/scout-bee-release-manifest.json
            dist/scout-bee-sbom.cdx.json
            dist/scout-bee-license-report.md
            dist/SHA256SUMS

      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          signing_mode="$(node -e "const fs=require('fs'); process.stdout.write(JSON.parse(fs.readFileSync('dist/scout-bee-windows-signing.json','utf8')).signingMode)")"
          release_warning=""
          if [[ "$signing_mode" == "unsigned-preview" ]]; then
            release_warning=$'## Unsigned Preview warning\n\nThe Windows executable in this Preview is intentionally **not Authenticode signed** because the signing secrets were unavailable and the maintainer explicitly opted in for this run. Verify `SHA256SUMS` and the GitHub artifact attestation before testing. Do not treat this Preview package as an RC or Stable build.'
          fi
          if [[ "$version" == *-* ]]; then
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag --prerelease --latest=false --generate-notes --notes "$release_warning" \
              --title "Scout Bee $version"
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag --generate-notes \
              --title "Scout Bee $version"
          fi

  # ---------------------------------------------------------------------------
  # C2 package-manager submission jobs - DISABLED until GV4.
  # Both jobs are hard-gated with `if: false`: they cannot run on any trigger
  # until a maintainer deliberately edits this file after the owner passes the
  # GV4 stable gate (signed artifacts + conformance evidence). Stable versions
  # only; previews and RCs are never submitted to any package manager.
  # ---------------------------------------------------------------------------

  winget-submission:
    # GV4 gate: submission to microsoft/winget-pkgs is locked until GV4.
    # Flipping `if: false` is the explicit enable switch and is an owner
    # decision recorded in the platform plan. Untested automation: this job has
    # never run; validate it on a fork before the first enabled run.
    if: ${{ false }}
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Submit winget manifest update with komac
        env:
          # komac requires a CLASSIC personal access token with `public_repo`
          # scope on an account that owns a fork of microsoft/winget-pkgs.
          # Fine-grained PATs and GitHub App installation tokens are NOT
          # supported for komac's cross-repo PR flow (DIST-001 finding 3), so
          # this secret is a recorded exception to the GitHub-App-token rule.
          KOMAC_PAT: ${{ secrets.WINGET_SUBMISSION_PAT }}
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          case "$version" in
            *-*) echo "Refusing to submit non-stable version $version to winget." >&2; exit 1 ;;
          esac
          curl -fsSL -o komac.deb \
            https://github.com/russellbanks/Komac/releases/download/v2.16.0/komac_2.16.0-1_amd64.deb
          sudo dpkg -i komac.deb
          # NOTE: the FIRST version of ApiaryLens.ScoutBee must be submitted as
          # a manual PR to microsoft/winget-pkgs (see packaging/winget/); komac
          # can only update a package that already exists in the repository.
          komac update ApiaryLens.ScoutBee \
            --version "$version" \
            --urls "https://github.com/ApiaryLens/scout-bee/releases/download/v${version}/scout-bee-${version}-windows-amd64.exe" \
            --submit \
            --token "$KOMAC_PAT"

  chocolatey-submission:
    # GV4 gate: pushing to the Chocolatey Community Repository is locked until
    # GV4. Flipping `if: false` is the explicit enable switch and is an owner
    # decision recorded in the platform plan. First-party `choco pack` and
    # `choco push` only - chocolatey-AU is GPL-2.0 and is deliberately not used
    # (DIST-002 finding 3). Untested automation: this job has never run;
    # validate it on a fork before the first enabled run.
    if: ${{ false }}
    needs: publish
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Pack and push Chocolatey package from published release bytes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $version = (Get-Content -Raw VERSION).Trim()
          if ($version -like '*-*') { throw "Refusing to submit non-stable version $version to Chocolatey." }
          New-Item -ItemType Directory -Force dist | Out-Null
          gh release download "v$version" --pattern SHA256SUMS --dir dist
          $line = Select-String -Path dist/SHA256SUMS -Pattern ([regex]::Escape("scout-bee-$version-windows-amd64.exe")) |
            Select-Object -First 1
          if (-not $line) { throw 'Release SHA256SUMS does not list the Windows executable.' }
          $sha256 = ($line.Line -split '\s+')[0]
          $staging = 'dist/choco/scout-bee'
          New-Item -ItemType Directory -Force $staging | Out-Null
          Copy-Item packaging/chocolatey/scout-bee/* $staging -Recurse -Force
          foreach ($file in @("$staging/scout-bee.nuspec", "$staging/tools/chocolateyinstall.ps1")) {
            (Get-Content -Raw $file).Replace('{VERSION}', $version).Replace('{SHA256_EXE_AMD64}', $sha256) |
              Set-Content -NoNewline -Path $file
          }
          choco pack "$staging/scout-bee.nuspec" --output-directory dist/choco
          $nupkg = Get-ChildItem dist/choco/*.nupkg -File -ErrorAction Stop
          choco push $nupkg.FullName --source https://push.chocolatey.org/ --api-key $env:CHOCOLATEY_API_KEY
